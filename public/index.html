<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>7Upload — Gaming Clips</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/components.css" />
  </head>
  <body>
    <div id="login-loader" class="login-loader-overlay">
      <div>
        <div class="loader">
          <span><span></span><span></span><span></span><span></span></span>
          <div class="base"><span></span><div class="face"></div></div>
        </div>
        <div class="longfazers">
          <span></span><span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <nav class="navbar">
      <div class="navbar-inner">
        <a href="#home" class="brand" data-nav="home">7<span>Upload</span></a>

        <button type="button" class="menu-toggle" id="menu-toggle" aria-label="Menu">☰</button>

        <div class="nav-links" id="nav-links">
          <a href="#home" class="nav-btn" data-nav="home"><span data-i18n="nav.home">Home</span></a>
          <a href="#clips" class="nav-btn" data-nav="clips"><span data-i18n="nav.clips">Clips</span></a>
          <a href="#users" class="nav-btn" data-nav="users"><span data-i18n="nav.users">Users</span></a>
          <a href="#upload" class="nav-btn nav-btn-accent" data-nav="upload" id="nav-upload"><span data-i18n="nav.upload">Upload</span></a>
        </div>

        <div class="nav-actions">
          <div class="lang-group">
            <button type="button" class="lang-btn active" data-lang="en">EN</button>
            <button type="button" class="lang-btn" data-lang="ar">AR</button>
          </div>

          <label class="theme-switch" title="Theme">
            <input id="theme-input" type="checkbox" checked />
            <div class="slider round">
              <div class="sun-moon">
                <svg id="moon-dot-1" class="moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                <svg id="moon-dot-2" class="moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                <svg id="moon-dot-3" class="moon-dot" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                <svg id="light-ray-1" class="light-ray" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                <svg id="light-ray-2" class="light-ray" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                <svg id="light-ray-3" class="light-ray" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                <svg id="cloud-1" class="cloud-dark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                <svg id="cloud-2" class="cloud-dark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                <svg id="cloud-3" class="cloud-dark" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                <svg id="cloud-4" class="cloud-light" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                <svg id="cloud-5" class="cloud-light" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
                <svg id="cloud-6" class="cloud-light" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50"></circle></svg>
              </div>
              <div class="stars">
                <svg id="star-1" class="star" viewBox="0 0 20 20"><path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path></svg>
                <svg id="star-2" class="star" viewBox="0 0 20 20"><path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path></svg>
                <svg id="star-3" class="star" viewBox="0 0 20 20"><path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path></svg>
                <svg id="star-4" class="star" viewBox="0 0 20 20"><path d="M 0 10 C 10 10,10 10 ,0 10 C 10 10 , 10 10 , 10 20 C 10 10 , 10 10 , 20 10 C 10 10 , 10 10 , 10 0 C 10 10,10 10 ,0 10 Z"></path></svg>
              </div>
            </div>
          </label>

          <div id="auth-slot">
            <a href="/auth/discord" class="discord-login-btn" data-i18n="auth.login">Login with Discord</a>
          </div>
        </div>
      </div>
    </nav>

    <main>
      <section id="page-home" class="page active">
        <div class="hero">
          <h1 data-i18n="home.title">Share Your Gaming Moments</h1>
          <p data-i18n="home.desc">
            Upload unlimited gaming clips in full quality. Like clips, track views, and build your profile with Discord.
          </p>
          <a href="#clips" class="btn-primary btn-lg" data-nav="clips"><span data-i18n="home.cta">Browse Clips</span></a>
        </div>
        <h2 class="section-title" data-i18n="home.latest">Latest Clips</h2>
        <div id="home-clips" class="clips-grid"></div>
      </section>

      <section id="page-clips" class="page">
        <h2 class="section-title" data-i18n="clips.title">All Clips</h2>
        <div id="clips-grid" class="clips-grid"></div>
      </section>

      <section id="page-users" class="page">
        <h2 class="section-title" data-i18n="users.title">Community</h2>
        <div id="users-grid" class="users-grid"></div>
      </section>

      <section id="page-upload" class="page">
        <h2 class="section-title" data-i18n="upload.title">Upload Clip</h2>
        <div class="upload-panel">
          <div class="uiverse-pixel-input-wrapper">
            <label class="uiverse-pixel-label" for="clip-title" data-i18n="upload.titleLabel">TITLE</label>
            <input class="uiverse-pixel-input" id="clip-title" type="text" data-i18n-placeholder="upload.titlePh" placeholder="Enter title..." />
          </div>
          <div class="uiverse-pixel-input-wrapper">
            <label class="uiverse-pixel-label" for="clip-desc" data-i18n="upload.descLabel">DESCRIPTION</label>
            <textarea class="uiverse-pixel-textarea" id="clip-desc" data-i18n-placeholder="upload.descPh" placeholder="Optional description..."></textarea>
          </div>
          <div class="file-drop" id="file-drop">
            <p data-i18n="upload.drop">Drop video here or click to select</p>
            <p class="file-name" id="file-name"></p>
            <input type="file" id="video-file" accept="video/*" />
          </div>
          <button type="button" class="buttonDownload" id="upload-btn" data-i18n="upload.btn">Upload</button>
        </div>
      </section>

      <section id="page-profile" class="page">
        <div id="profile-content"></div>
        <h2 class="section-title" data-i18n="profile.clips">Clips</h2>
        <div id="profile-clips" class="clips-grid"></div>
      </section>
    </main>

    <div id="clip-modal" class="modal-overlay" role="dialog" aria-modal="true">
      <div class="modal">
        <div class="modal-head">
          <div>
            <h3 id="modal-title"></h3>
            <p id="modal-desc" style="color: var(--text-muted); margin: 0.25rem 0 0"></p>
          </div>
          <button type="button" class="close-btn" id="modal-close" aria-label="Close">×</button>
        </div>
        <video id="modal-video" controls playsinline></video>
        <div class="modal-actions">
          <div id="modal-like"></div>
          <span class="views-badge" id="modal-views"></span>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/js/i18n.js"></script>
    <script src="/js/theme.js"></script>
    <script type="module" src="/js/app.js"></script>
  </body>
</html>
